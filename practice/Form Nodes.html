<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodes</title>
    <script src="00.js"></script>
</head>
<body>
    <input type="text" id="put" placeholder="Your Name"/>
    <button id="btn">Create Text</button>
    <button id="btn1">Alert Text</button>
    <p id="demo"></p>
    <script>
        var btn = document.getElementById('btn');
        var btn1 = document.getElementById('btn1');
        btn.addEventListener('click' , append);
        btn1.addEventListener('click' , message);

        
        function append() {
            content = document.getElementById('put').value.toUpperCase();
            var demo = document.getElementById('demo');
            demo.innerHTML = content;
        }

        function message() {
            alert(content);
        }
    </script>
</body>
</html>

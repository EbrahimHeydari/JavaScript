<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>function Condition</title>
    <script src="00.js"></script>
    <script>
        function name_value() {
            var name = prompt('نام خود را وارد کنید' , '');

            if(name === null || name === '') {
            return('شما ناشناس هستید');
            }
            else{
            return('سلام ' + name + br + ' خوش آمدید');
            }
        }
        
        function age_value() {
            var birth = prompt('سال تولد خود را وارد کنید (میلادی)');
            myage = date.getFullYear() - birth;

            if (birth === null || birth === ''){
                return('سن شما نامعلوم است');
            }
            else{
                return('شما ' + myage + ' ساله هستید');
            }
        }

        function avg_value() {
            var avg = prompt('معدل خود را وارد کنید' , 20);

            if(avg === null || avg === ' ') {
                return('معدل خود را وارد نکردید');
            }
            else {
                return('معدل شما ' + avg + ' است');
            }
        }
        function update_value() {
            var name = name_value();
            var age  = age_value();
            var avg  = avg_value();
            document.write("<div dir='rtl'>" + name + br + age + br + avg + br + "</div>");
        }
    </script>
</head>
<body dir="rtl">
    <div>
        <button onclick="update_value()">Click</button>
    </div>
    <div>
        <a href="03.html">بعدی</a>
    </div>
</body>
</html>

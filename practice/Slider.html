<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
</head>

<body>

    <div class="slideshow-container">

        <!-- اسم و آدرس و شماره مربوط به تصاویر -->
        <div class="mySlides fade">
            <div class="numbertext">1 / 3</div>
            <img src="../Documentation/img/(4).jpg">
            <div class="text"></div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 3</div>
            <img src="../Documentation/img/(5).jpg">
            <div class="text"></div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 3</div>
            <img src="../Documentation/img/(6).jpg">
            <div class="text"></div>
        </div>

        <!-- ایجاد دکمه های قبل و بعد -->
        <div class="buttons">
            <a class="prev" onclick="plusSlides(-1)">❮</a>
            <a class="next" onclick="plusSlides(1)">❯</a>
        </div>

        <!-- دکمه های دایره ای اسلایدر -->
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>



    <style>
        * {
            box-sizing: border-box;
            text-align: center;
            padding: 0;
            margin: 0;
        }

        /* باکس اصلی اسلایدر */
        .slideshow-container {
            max-height: 100vh;
            max-width: 100vw;
        }

        /* پنهان کردن پیش فرض تصاویر */
        .mySlides {
            display: none;
        }

        .mySlides img {
            width: 100%;
            height: 80vh;
        }

        /* استایل دکمه های قبل و بعد */
        .buttons {
            display: flex;
            width: 80%;
        }

        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }

        /* مکان دکمه .next  */
        /* دهید .prev  اگر سیستم تان راست چین است، باید این ویژگی را به  */
        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        /* تغییرات بر اثر آمدن روی دکمه ها */
        .prev:hover,
        .next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        /* تیتر های تصاویر */
        .text {
            color: #f2f2f2;
            font-size: 15px;
            padding: 8px 12px;
            position: absolute;
            bottom: 8px;
            width: 100%;
            text-align: center;
        }

        /* شماره های تصاویر */
        .numbertext {
            color: #f2f2f2;
            font-size: 12px;
            padding: 8px 12px;
            position: absolute;
            top: 0;
        }


        /*دکمه های دایره ای اسلایدر */
        .dot {
            cursor: pointer;
            height: 20px;
            width: 20px;
            margin-top: 20px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: 0.6s ease;
        }

        .active,
        .dot:hover {
            background-color: #717171;
        }

        /* سیستم محو شدن */
        .fade {
            -webkit-animation-name: fade;
            -webkit-animation-duration: 1.5s;
            animation-name: fade;
            animation-duration: 1.5s;
        }

        /* یک سری کار مربوط به انیمیشن */
        @-webkit-keyframes fade {
            from {
                opacity: .4
            }

            to {
                opacity: 1
            }
        }

        @keyframes fade {
            from {
                opacity: .4
            }

            to {
                opacity: 1
            }
        }
    </style>

    <script>
        var slideIndex = 1;
        showSlides(slideIndex);

        // دکمه های قبل و بعد
        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        // مشخص کردن لینک در تصاویر
        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            var i;
            var slides = document.getElementsByClassName("mySlides");
            var dots = document.getElementsByClassName("dot");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none"
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex - 1].style.display = "block"
            dots[slideIndex - 1].className += " active"
        }
    </script>
</body>

</html>

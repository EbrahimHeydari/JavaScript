<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>abs</title>

  <style>
    button {
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>

<body>
  <form action="#">
    <div>
      <input type="number">
    </div>
    <button type="submit">Send</button>
  </form>
  <p id="demo"></p>

  <script>
    let number = document.querySelector('input');
    let demo = document.querySelector('#demo');

    document.querySelector('button').addEventListener('click', function() {
      (number.value < 0) ? demo.innerHTML = number.value * -1 : demo.innerHTML = number.value;
    })
    
    // document.querySelector('button').addEventListener('click', function() {
    //   demo.innerHTML = Math.abs(number.value)
    // })
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../Project/Creative/reset.css">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-flow: column;
            align-items: center;
            justify-content: center;
            font-family: Vazir, 'Segoe UI', Verdana, sans-serif;
        }

        .form {
            width: 300px;
            height: 250px;
            border-radius: 10px;
            background: linear-gradient(0deg, teal, cyan);
            display: flex;
            flex-flow: column;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
        }

        .put {
            width: 100%;
            padding: 10px;
            margin: 50px 0;
            border-radius: 40px;
            text-align: center;
        }

        button {
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
            transition: .3s;
            font-size: 14px;
            color: teal;
        }

        button:active {
            transform: scale(.9);
            background: linear-gradient(0deg, cyan, teal);
            color: #fff;
        }

        h1 {
            font-size: 2rem;
        }
    </style>
</head>

<body dir="rtl">
    <h1>شعاع مورد نظر را وارد کنید</h1>
    <form class="form" action="#">
        <div class="box">
            <input type="number" placeholder="شعاع" class="put" required>
        </div>
        <div class="box">
            <button onclick="lengthArray()">ارسال</button>
        </div>
    </form>

    <div class="result">
        <p id="one"></p>
        <p id="two"></p>
        <p id="three"></p>
    </div>

    <script>
        var radial = document.querySelector('.put');
        var one = document.getElementById('one');
        var two = document.getElementById('two');
        var three = document.getElementById('three');

        function show() {
            var space = Math.round(radial.value * radial.value * Math.PI);
            var perimeter = Math.round(radial.value * 2 * Math.PI);

            one.innerHTML = `مساحت دایره: ${space}`;
            two.innerHTML = `محیط دایره: ${perimeter}`;
        }

        function factoriel() {
            let fact = 1;
            for (let i = 1; i < radial.value; i++) {
                fact *= i;
            }
            if (radial.value == '') {
                three.innerHTML = '';
            } else {
                three.innerHTML = `فاکتوریل ${radial.value}: ${fact}`;
            }
        }

        function lengthArray() {

            let count = [];
            let pos = 0;
            let neg = 0;
            for (let i = 0; i < radial.value; i++) {
                count[i] = Math.round(Math.random() * 100);
                pos += count[i];
                neg += -count[i];
            }

            if (radial.value == '') {
                one.innerHTML , two.innerHTML = '';
            } else {
                one.innerHTML = pos;
                two.innerHTML = neg;
            }
            console.log(count)
        }
    </script>
</body>

</html>

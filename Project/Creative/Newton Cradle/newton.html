<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Newton Cradle</title>
</head>
<body>
    <div class="box">
        <button onclick="stop()">Stop</button>
        <button onclick="resume()">Resume</button>
    </div>
    <img src="img/part.png" alt="part" class="part one" id="_one">
    <img src="img/part.png" alt="part" class="part two" id="_two">


    <script>
        var one = document.images[0];
        var two = document.images[1];

        function stop() {
            one.removeAttribute('id' , '_one');
            two.removeAttribute('id' , '_two');
        }

        function resume() {
            one.setAttribute('id' , '_one');
            two.setAttribute('id' , '_two');
        }
    </script>
</body>
</html>

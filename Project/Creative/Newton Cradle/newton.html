<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="newton.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton Cradle</title>
</head>

<body>
    <div class="container">
        <img src="img/cradle.png" class="cradle">
        <img src="img/part.png" alt="part" class="part one">
        <img src="img/part.png" alt="part" class="part two">
        <div class="box">
            <button onclick="start(this)">
                <img src="img/play.svg" class="click">
            </button>
        </div>
    </div>


    <script>
        var one = document.images[1];
        var two = document.images[2];
        var click = document.querySelector('.click');

        function start(button) {
            one.classList.toggle('first');
            two.classList.toggle('second');

            if (click.getAttribute('src') == 'img/play.svg') {
                click.src = 'img/pause.svg';
            }
            else {
                click.src = 'img/play.svg'
            }
        }
    </script>
</body>

</html>

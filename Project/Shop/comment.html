<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Fata Store</title>
</head>

<body>
    <header class="hdr">
        <h1 class="title-head"><a href="home.html">فـــروشـــگـــاه فــــتــــا</a></h1>

        <form method="get" class="search">
            <input type="image" src="icon/search.svg" alt="Search" />
            <input type="search" placeholder="جستجو به انگلیسی" />
        </form>

        <div class="hamburger">
            <img src="icon/Hamburger_icon.png" alt="menu" id="menu">
        </div>

        <nav class="navigation" id="mobile">
            <ul class="nav-list">
                <li class="list-item">
                    <div class="mode">
                        <input id="check" type="checkbox">
                        <label id="click" for="check"></label>
                    </div>
                </li>
                <li class="list-item">
                    <a href="home.html">صفحه اصلی</a>
                </li>
                <li class="list-item">
                    <a href="signup.html">ثبت نام</a>
                </li>
                <li class="list-item">
                    <a href="login.html">ورود</a>
                </li>
                <li class="list-item">
                    <a href="list.html">سبد خرید</a>
                </li>
                <li class="list-item">
                    <a href="shop.html">خرید کالا</a>
                </li>
                <li class="list-item">
                    <a href="comment.html">نظرات</a>
                </li>
                <li class="list-item">
                    <img src="icon/icon_close_alt.svg" alt="close" id="close">
                </li>
            </ul>
        </nav>

    </header>

    <main class="container">
        <div class="box">
            <table>
                <thead>
                    <tr>
                        <td>نام</td>
                        <td>دیدگاه</td>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="history">
            <button onclick="history.back()">صفحه قبل</button>
            <button onclick="history.forward()">صفحه بعد</button>
        </div>
    </main>

    <aside class="side">
        <h1>ارسال نظرات</h1>
        <form action="#" name="form" class="form4" method="POST">
            <div class="inbox">
                <input type="text" name="name" id="name" placeholder="نام" required autofocus>
            </div>
            <div class="inbox">
                <input type="email" name="email" id="mail" placeholder="ایمیل" required>
            </div>
            <div class="inbox">
                <textarea name="comment" id="comment" cols="20" rows="10" placeholder='دیدگاه'></textarea>
            </div>
            <div class="inbox">
                <button type="submit">ارسال</button>
            </div>
            <input type="hidden" name="MM_insert" value="form">
        </form>
    </aside>

    <footer class="ftr">
        <div class="copyraight">
            <p>&copy; تمامی حقوق مادی و معنوی این وبسایت متعلق به فروشگاه فتا می باشد</p>
        </div>

        <div class="contain-icon">
            <a href="https://www.facebook.com">
                <img src="icon/social_facebook_circle.svg" alt="social_facebook" class="link-icon" />
            </a>
            <a href="https://www.twitter.com">
                <img src="icon/social_twitter_circle.svg" alt="social_twitter" class="link-icon" />
            </a>
            <a href="https://www.youtube.com">
                <img src="icon/social_youtube_circle.svg" alt="social_youtube" class="link-icon" />
            </a>
            <a href="https://www.linkedin.com">
                <img src="icon/social_linkedin_circle.svg" alt="social_linkedin" class="link-icon" />
            </a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>

    // با الگو
    class NullUser {
      constructor() {
        this.id = -1
        this.name = 'Guest'
        this.role = 'GUEST'
      }
    }

    function getUser(id) {
      return users.find(user => user.id === id) || new NullUser()
    }

    function printUser(id) {
      const user = getUser(id)

      console.log(`hello ${user.name}`)
      user.hasAccess()
        ? console.log('you have access')
        : console.log('access denied')

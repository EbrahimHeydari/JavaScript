<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change the attribute</title>
    <script src="00.js"></script>
</head>

<body onload="ShowDir()">

    <div class="image">
        <img src="../../../../Picture/Wallpaper/1.jpg" width="450" height="300" alt="image">
    </div>

    <div class="source">
        <button id="next" onclick="Go(1)">Next</button>
        <button id="previous" onclick="Go(-1)">Previous</button>
    </div>
    <div>
        <input type="number" id="goto" placeholder="Between 1 & 690">
        <button onclick="GoTo()">Go</button>
    </div>

    <div class="Buttons">
        <button onclick="Double()">Double size</button>
        <button onclick="Resize()">reset size</button>
        <button onclick="Remove()">Delete</button>
    </div>

    <div class="dir">
        <p id="demo"></p>
    </div>
    <script>
        // دسترسی به صفات عناصر

        // getAttribute()
        //  نام خصوصیت عنصر را بر می گرداند
        var b = document.body;
        // console.log(b.getAttribute('id'));


        // setAttribute()
        //  برای عنصر خصوصیتی جدید تعریف می کند
        // b.setAttribute('class', 'body') 


        // removeAttribute()
        //  خصوصیت مورد نظر را حذف می کند
        // b.removeAttribute('id');

        
        // remove(index)
        // گره مورد نظر را حذف می کند



        var index = 1;
        var img = document.querySelector('img');
        var goto = document.getElementById('goto');
        var event = addEventListener('click', ShowDir);

        goto.event;
        document.getElementById('next').event;
        document.getElementById('previous').event;

        // عکس بعدی و عکس قبلی
        function Go(value) {
            if (index < 1) {
                index = 690;
            }
            if (index > 690) {
                index = 1;
            }
            img.setAttribute('src', '../../../../Picture/Wallpaper/' + index + '.jpg');
            index += value;
        }

        // رفتن به عکس بعدی از طریق شماره عکس
        function GoTo() {
            index = Number(goto.value);
            img.setAttribute('src', '../../../../Picture/Wallpaper/' + index + '.jpg');
            if (index > 690) {
                alert('This Number Not Valid!');
                throw 'This Number Not Valid!';
            }
        }

        // نمایش نام عکس
        function ShowDir() {
            var demo = document.getElementById('demo');
            demo.innerHTML = img.getAttribute('src').substr(30);
        }

        // حذف عکس
        function Remove() {
            // img.removeAttribute('src');
            img.remove(0);
        }

        // دو برابر کردن اندازه عکس
        function Double() {
            img.width = '900';
            img.height = '600';
        }

        // بر گرداندن عکس به اندازه اصلی
        function Resize() {
            img.width = '450';
            img.height = '300';
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scope variables</title>
</head>
<body>
  

  <script>
    // Block Scope
    (function foo() {
      for (let i = 0; i < 3 ; i++) {
        console.log(i)
      }
      console.log(i*3)
    })();
  </script>
</body>
</html>
